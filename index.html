<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelly Sizer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #e8e8e8; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    #app { max-width: 560px; margin: 0 auto; padding: 1.5rem; }
    .mono { font-family: 'DM Mono', monospace; }
    .divider { height: 1px; background: #1e1e1e; margin: 1rem 0; }
    .section-label { font-size: 11px; color: #555; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .field { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
    .field label { font-size: 13px; color: #888; width: 138px; flex-shrink: 0; font-family: 'DM Mono', monospace; }
    .field-hint { font-size: 11px; color: #555; }
    input[type=number], input[type=text], select {
      height: 34px; padding: 0 10px; font-size: 14px; border-radius: 6px;
      border: 1px solid #2a2a2a; background: #111; color: #e8e8e8;
      font-family: 'DM Mono', monospace; outline: none;
    }
    input[type=number], select { width: 130px; }
    input[type=text] { flex: 1; width: auto; }
    select { width: 150px; }
    .hero { background: #161616; border-radius: 10px; padding: 1.1rem 1.3rem; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end; border: 1px solid #1e1e1e; }
    .hero-stake-label { font-size: 12px; color: #666; font-family: 'DM Mono', monospace; margin-bottom: 3px; }
    .hero-stake-val { font-size: 36px; font-weight: 500; letter-spacing: -0.03em; color: #e8e8e8; font-family: 'DM Mono', monospace; line-height: 1.1; }
    .hero-total-label { font-size: 11px; color: #555; font-family: 'DM Mono', monospace; margin-bottom: 2px; text-align: right; }
    .hero-total-val { font-size: 18px; font-weight: 500; color: #888; font-family: 'DM Mono', monospace; text-align: right; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
    .stat-card { background: #161616; border: 1px solid #1e1e1e; border-radius: 8px; padding: 10px 12px; text-align: center; }
    .stat-label { font-size: 11px; color: #666; font-family: 'DM Mono', monospace; margin-bottom: 3px; }
    .stat-val { font-size: 18px; font-weight: 500; font-family: 'DM Mono', monospace; color: #e8e8e8; }
    .meta-row { padding: 7px 12px; border-radius: 7px; border: 1px solid #1e1e1e; display: flex; gap: 20px; margin-bottom: 10px; flex-wrap: wrap; }
    .meta-item { font-size: 12px; color: #555; font-family: 'DM Mono', monospace; }
    .meta-item span { color: #888; }
    .illiquid-toggle { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 7px; border: 1px solid #1e1e1e; background: transparent; cursor: pointer; margin-bottom: 10px; user-select: none; transition: all .15s; }
    .illiquid-toggle.active { border-color: #7a5a00; background: #1a1400; }
    .illiquid-box { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid #333; background: transparent; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .illiquid-toggle.active .illiquid-box { border-color: #c4860a; background: #c4860a; }
    .illiquid-label { font-size: 13px; color: #666; font-family: 'DM Mono', monospace; }
    .illiquid-toggle.active .illiquid-label { color: #c4860a; font-weight: 500; }
    .log-btn { width: 100%; height: 40px; font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; border-radius: 7px; border: 1px solid #2a2a2a; background: #161616; color: #e8e8e8; cursor: pointer; transition: all .15s; }
    .log-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .log-btn.success { background: #0d1f0d; color: #4caf6a; }
    .log-btn.error { background: #1f0d0d; color: #e05555; }
    .params-toggle { background: none; border: none; color: #555; font-size: 12px; cursor: pointer; padding: 0; font-family: 'DM Mono', monospace; display: flex; align-items: center; gap: 6px; }
    .params-toggle .arrow { font-size: 9px; display: inline-block; transition: transform .15s; }
    .params-toggle .arrow.open { transform: rotate(90deg); }
    .reset-link { background: none; border: none; color: #c4860a; font-size: 11px; cursor: pointer; font-family: 'DM Mono', monospace; padding: 0; }
    .restore-link { background: none; border: none; color: #555; font-size: 11px; cursor: pointer; font-family: 'DM Mono', monospace; padding: 0; margin-top: 6px; display: block; }
    .placeholder { font-size: 13px; color: #444; text-align: center; padding: 1rem 0; font-family: 'DM Mono', monospace; }
    /* Session log */
    .session-log { margin-bottom: 1.5rem; border: 1px solid #1e1e1e; border-radius: 8px; overflow: hidden; }
    .session-log-header { background: #111; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e1e1e; }
    .session-log-title { font-size: 11px; color: #555; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: .06em; }
    .copy-btn { background: #1e1e1e; border: 1px solid #2a2a2a; color: #888; font-size: 11px; border-radius: 5px; padding: 3px 10px; cursor: pointer; font-family: 'DM Mono', monospace; transition: all .15s; }
    .copy-btn.copied { background: #0d1f0d; color: #4caf6a; }
    .log-row { padding: 9px 12px; display: flex; justify-content: space-between; align-items: center; gap: 12px; border-bottom: 1px solid #161616; }
    .log-row:last-child { border-bottom: none; }
    .log-row-left { flex: 1; min-width: 0; }
    .log-row-name { font-size: 12px; color: #e8e8e8; font-family: 'DM Mono', monospace; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .log-row-sub { font-size: 11px; color: #555; font-family: 'DM Mono', monospace; }
    .log-row-right { text-align: right; flex-shrink: 0; }
    .log-row-stake { font-size: 14px; font-weight: 500; font-family: 'DM Mono', monospace; color: #e8e8e8; margin-bottom: 1px; }
    .log-row-units { font-size: 11px; color: #555; font-family: 'DM Mono', monospace; }
    .log-row-del { background: none; border: none; color: #333; font-size: 16px; cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0; }
    .illiquid-badge { margin-left: 6px; font-size: 10px; color: #c4860a; background: #1a1400; padding: 1px 5px; border-radius: 3px; }
    .log-count-btn { background: #161616; border: 1px solid #2a2a2a; color: #888; font-size: 12px; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-family: 'DM Mono', monospace; }
    header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
    h1 { font-size: 18px; font-weight: 500; font-family: 'DM Mono', monospace; color: #e8e8e8; letter-spacing: -0.02em; margin-bottom: 2px; }
    .subtitle { font-size: 12px; color: #555; font-family: 'DM Mono', monospace; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>Kelly Sizer</h1>
      <p class="subtitle">AN edge → stake</p>
    </div>
    <button class="log-count-btn" id="log-count-btn" style="display:none" onclick="toggleLog()"></button>
  </header>

  <div class="session-log" id="session-log" style="display:none">
    <div class="session-log-header">
      <span class="session-log-title">Session log</span>
      <button class="copy-btn" id="copy-btn" onclick="copyTSV()">Copy TSV</button>
    </div>
    <div id="log-rows"></div>
  </div>

  <!-- Parameters -->
  <div style="margin-bottom:1rem">
    <button class="params-toggle" onclick="toggleParams()">
      <span class="arrow" id="params-arrow">▶</span>
      <span id="params-label">Parameters</span>
    </button>
    <div id="params-section" style="display:none; padding-top:10px">
      <div class="field"><label>Bankroll ($)</label><input type="number" id="bankroll" value="10000" min="1" step="100" oninput="onParamChange()"></div>
      <div class="field">
        <label>Kelly fraction (k)</label>
        <input type="number" id="kfrac" value="0.10" step="0.01" oninput="onParamChange()">
        <button class="reset-link" id="reset-k" style="display:none" onclick="resetK()"></button>
      </div>
      <div class="field">
        <label>Max units</label>
        <input type="number" id="maxunits" value="3" step="0.5" oninput="onParamChange()">
        <button class="reset-link" id="reset-units" style="display:none" onclick="resetUnits()"></button>
      </div>
      <div class="field">
        <label>Default hold %</label>
        <input type="number" id="hold" value="7" step="0.5" oninput="calc()">
        <span class="field-hint">(fallback)</span>
      </div>
      <button class="restore-link" id="restore-sport" style="display:none" onclick="restoreSport()"></button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Bet details -->
  <div style="margin-bottom:1rem">
    <p class="section-label">Bet details</p>
    <div class="field">
      <label>Sport</label>
      <select id="sport" onchange="onSportChange()">
        <option value="">Select…</option>
        <option>NHL</option><option>MLB</option><option>NBA</option>
        <option>NFL</option><option>Golf</option><option>Other</option>
      </select>
    </div>
    <div class="field"><label>Player / Game</label><input type="text" id="player" placeholder="e.g. J. Kochanowicz"></div>
    <div class="field"><label>Bet description</label><input type="text" id="desc" placeholder="e.g. Over 3.5 K"></div>
    <div class="field">
      <label>Book</label>
      <select id="book">
        <option value="">Select…</option>
        <option>DraftKings</option><option>FanDuel</option><option>bet365</option><option>BetRivers</option>
      </select>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Inputs -->
  <div style="margin-bottom:1rem">
    <p class="section-label">Inputs</p>
    <div class="field"><label>AN Edge %</label><input type="number" id="edge" step="0.001" placeholder="0.10" oninput="calc()"></div>
    <div class="field"><label>Your side odds</label><input type="number" id="odds" step="1" placeholder="-110 or 130" oninput="calc()"></div>
    <div class="field">
      <label>Other side odds</label>
      <input type="number" id="odds2" step="1" placeholder="optional" oninput="calc()">
      <span class="field-hint">(vig removal)</span>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Output -->
  <div id="placeholder" class="placeholder">Enter edge and odds above to see sizing.</div>

  <div id="output" style="display:none">
    <div class="hero">
      <div>
        <div class="hero-stake-label">Stake to risk</div>
        <div class="hero-stake-val" id="out-stake">—</div>
      </div>
      <div>
        <div class="hero-total-label">Total bet size</div>
        <div class="hero-total-val" id="out-total">—</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Units</div><div class="stat-val" id="out-units">—</div></div>
      <div class="stat-card"><div class="stat-label">No-vig prob</div><div class="stat-val" id="out-novig">—</div></div>
      <div class="stat-card"><div class="stat-label">True prob</div><div class="stat-val" id="out-true">—</div></div>
    </div>
    <div class="meta-row">
      <div class="meta-item">Full Kelly: <span id="out-kelly">—</span></div>
      <div class="meta-item">Vig: <span id="out-vig">—</span></div>
    </div>
    <div class="illiquid-toggle" id="illiquid-toggle" onclick="toggleIlliquid()">
      <div class="illiquid-box" id="illiquid-box">
        <svg id="illiquid-check" width="10" height="8" viewBox="0 0 10 8" fill="none" style="display:none">
          <path d="M1 4L3.5 6.5L9 1" stroke="#0d0d0d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="illiquid-label" id="illiquid-label">Mark as illiquid bet</span>
    </div>
    <button class="log-btn" id="log-btn" onclick="logBet()">Log to Sheets →</button>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby0UTFz_ycWi3yRHfVZGVYf3XwdVTn-88lTbohJnb_qJhzwNtkIgX7VA3LQDfqtjSYN/exec";
const HEADERS = ["Timestamp","Sport","Player / Game","Bet Description","Book","AN Edge %","Odds","Other Side Odds","Vig Method","No-Vig Prob %","True Prob %","Full Kelly","Units","Stake ($)","Total Bet ($)","Illiquid"];
const SPORT_PRESETS = { NHL:{kfrac:0.15,maxUnits:4}, MLB:{kfrac:0.10,maxUnits:3}, NBA:{kfrac:0.08,maxUnits:3}, NFL:{kfrac:0.10,maxUnits:3}, Golf:{kfrac:0.10,maxUnits:3}, Other:{kfrac:0.10,maxUnits:3} };

let illiquid = false;
let paramsOpen = false;
let logOpen = false;
let sessionLog = [];
let currentResult = null;

function toDecimal(a) { const n=parseFloat(a); if(isNaN(n))return null; return n>0?n/100:100/Math.abs(n); }
function impliedProb(a) { const n=parseFloat(a); if(isNaN(n))return null; return n>0?100/(n+100):Math.abs(n)/(Math.abs(n)+100); }

function toggleParams() {
  paramsOpen = !paramsOpen;
  document.getElementById('params-section').style.display = paramsOpen ? 'block' : 'none';
  document.getElementById('params-arrow').classList.toggle('open', paramsOpen);
  updateParamsLabel();
}

function updateParamsLabel() {
  const sport = document.getElementById('sport').value;
  const k = parseFloat(document.getElementById('kfrac').value);
  const mu = parseFloat(document.getElementById('maxunits').value);
  const preset = SPORT_PRESETS[sport];
  let label = 'Parameters';
  if (sport) {
    label += ` — ${sport}: k=${k}, max ${mu}u`;
    if (preset && (k !== preset.kfrac || mu !== preset.maxUnits)) label += ' (modified)';
  }
  document.getElementById('params-label').textContent = label;
}

function onSportChange() {
  const sport = document.getElementById('sport').value;
  const preset = SPORT_PRESETS[sport];
  if (preset) {
    document.getElementById('kfrac').value = preset.kfrac;
    document.getElementById('maxunits').value = preset.maxUnits;
  }
  updateParamsLabel();
  updateResetButtons();
  calc();
}

function onParamChange() { updateParamsLabel(); updateResetButtons(); calc(); }

function updateResetButtons() {
  const sport = document.getElementById('sport').value;
  const preset = SPORT_PRESETS[sport];
  const k = parseFloat(document.getElementById('kfrac').value);
  const mu = parseFloat(document.getElementById('maxunits').value);
  const rkBtn = document.getElementById('reset-k');
  const ruBtn = document.getElementById('reset-units');
  const rsBtn = document.getElementById('restore-sport');
  if (preset) {
    const kOvr = k !== preset.kfrac;
    const uOvr = mu !== preset.maxUnits;
    rkBtn.style.display = kOvr ? 'inline' : 'none';
    rkBtn.textContent = `reset to ${preset.kfrac}`;
    ruBtn.style.display = uOvr ? 'inline' : 'none';
    ruBtn.textContent = `reset to ${preset.maxUnits}`;
    rsBtn.style.display = (kOvr || uOvr) ? 'block' : 'none';
    rsBtn.textContent = `↺ restore ${sport} defaults (k=${preset.kfrac}, max ${preset.maxUnits}u)`;
  } else {
    rkBtn.style.display = ruBtn.style.display = rsBtn.style.display = 'none';
  }
}

function resetK() { const p=SPORT_PRESETS[document.getElementById('sport').value]; if(p){document.getElementById('kfrac').value=p.kfrac;onParamChange();} }
function resetUnits() { const p=SPORT_PRESETS[document.getElementById('sport').value]; if(p){document.getElementById('maxunits').value=p.maxUnits;onParamChange();} }
function restoreSport() { resetK(); resetUnits(); }

function calc() {
  const bankroll = parseFloat(document.getElementById('bankroll').value)||10000;
  const kfrac = parseFloat(document.getElementById('kfrac').value)||0.10;
  const maxUnits = parseFloat(document.getElementById('maxunits').value)||3;
  const hold = (parseFloat(document.getElementById('hold').value)||7)/100;
  const edgeInput = parseFloat(document.getElementById('edge').value);
  const oddsInput = document.getElementById('odds').value.trim();
  const odds2Input = document.getElementById('odds2').value.trim();

  const placeholder = document.getElementById('placeholder');
  const output = document.getElementById('output');

  if (isNaN(edgeInput) || !oddsInput) {
    placeholder.textContent = 'Enter edge and odds above to see sizing.';
    placeholder.style.display = 'block'; output.style.display = 'none'; currentResult = null; return;
  }
  const b = toDecimal(oddsInput);
  if (!b) return;

  let noVigProb, vigMethod;
  if (odds2Input) {
    const p1=impliedProb(oddsInput), p2=impliedProb(odds2Input);
    noVigProb=p1/(p1+p2); vigMethod='two-sided';
  } else {
    const p1=impliedProb(oddsInput);
    noVigProb=p1/(1+hold*p1); vigMethod='hold % fallback';
  }

  const trueProb = noVigProb + edgeInput;
  const fullKelly = (trueProb*(b+1)-1)/b;
  if (fullKelly <= 0) {
    placeholder.textContent = 'Negative Kelly — no edge at these inputs.';
    placeholder.style.display='block'; output.style.display='none'; currentResult=null; return;
  }

  const units = Math.min(fullKelly*kfrac*100, maxUnits);
  const totalBet = (units/100)*bankroll;
  const ao = parseFloat(oddsInput);
  const stake = ao<0 ? totalBet*Math.abs(ao)/(Math.abs(ao)+100) : totalBet*100/(ao+100);

  currentResult = { noVigProb, trueProb, fullKelly, units, totalBet, stake, vigMethod, edgeInput, oddsInput, odds2Input };

  document.getElementById('out-stake').textContent = '$'+stake.toFixed(2);
  document.getElementById('out-total').textContent = '$'+totalBet.toFixed(2);
  document.getElementById('out-units').textContent = units.toFixed(2);
  document.getElementById('out-novig').textContent = (noVigProb*100).toFixed(2)+'%';
  document.getElementById('out-true').textContent = (trueProb*100).toFixed(2)+'%';
  document.getElementById('out-kelly').textContent = fullKelly.toFixed(4);
  document.getElementById('out-vig').textContent = vigMethod;

  placeholder.style.display='none'; output.style.display='block';
}

function toggleIlliquid() {
  illiquid = !illiquid;
  document.getElementById('illiquid-toggle').classList.toggle('active', illiquid);
  document.getElementById('illiquid-check').style.display = illiquid ? 'block' : 'none';
  document.getElementById('illiquid-label').textContent = illiquid ? 'Illiquid bet flagged' : 'Mark as illiquid bet';
}

async function logBet() {
  if (!currentResult) return;
  const btn = document.getElementById('log-btn');
  btn.disabled = true; btn.textContent = 'Logging…'; btn.className = 'log-btn';

  const row = {
    timestamp: new Date().toLocaleString(),
    sport: document.getElementById('sport').value,
    player: document.getElementById('player').value,
    desc: document.getElementById('desc').value,
    book: document.getElementById('book').value,
    edge: currentResult.edgeInput,
    odds: currentResult.oddsInput,
    odds2: currentResult.odds2Input || '',
    vigMethod: currentResult.vigMethod,
    noVigProb: (currentResult.noVigProb*100).toFixed(2),
    trueProb: (currentResult.trueProb*100).toFixed(2),
    fullKelly: currentResult.fullKelly.toFixed(4),
    units: currentResult.units.toFixed(2),
    stake: currentResult.stake.toFixed(2),
    totalBet: currentResult.totalBet.toFixed(2),
    illiquid: illiquid ? 'Yes' : 'No'
  };

  try {
    const params = new URLSearchParams(row);
    const resp = await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`);
    const data = await resp.json();
    if (data.status === 'ok') {
      sessionLog.push(row);
      renderLog();
      btn.textContent = 'Logged ✓'; btn.className = 'log-btn success';
      // Reset bet fields
      document.getElementById('player').value = '';
      document.getElementById('desc').value = '';
      document.getElementById('edge').value = '';
      document.getElementById('odds').value = '';
      document.getElementById('odds2').value = '';
      if (illiquid) toggleIlliquid();
      calc();
      setTimeout(() => { btn.textContent = 'Log to Sheets →'; btn.className = 'log-btn'; btn.disabled = false; }, 2000);
    } else {
      throw new Error(data.message || 'Script error');
    }
  } catch(err) {
    console.error(err);
    btn.textContent = 'Error — retry ↗'; btn.className = 'log-btn error';
    setTimeout(() => { btn.textContent = 'Log to Sheets →'; btn.className = 'log-btn'; btn.disabled = false; }, 3000);
  }
}

function renderLog() {
  const container = document.getElementById('log-rows');
  container.innerHTML = '';
  sessionLog.forEach((row, i) => {
    const div = document.createElement('div');
    div.className = 'log-row';
    const meta = [row.sport, row.book, row.odds, `edge ${row.edge}`].filter(Boolean).join(' · ');
    div.innerHTML = `
      <div class="log-row-left">
        <div class="log-row-name">${row.player||'—'}${row.desc?' · '+row.desc:''}${row.illiquid==='Yes'?'<span class="illiquid-badge">illiquid</span>':''}</div>
        <div class="log-row-sub">${meta}</div>
      </div>
      <div class="log-row-right">
        <div class="log-row-stake">$${row.stake}</div>
        <div class="log-row-units">${row.units}u</div>
      </div>
      <button class="log-row-del" onclick="deleteRow(${i})">×</button>`;
    container.appendChild(div);
  });
  const countBtn = document.getElementById('log-count-btn');
  if (sessionLog.length > 0) {
    countBtn.style.display = 'block';
    countBtn.textContent = (logOpen ? '▲' : '▼') + ` Log (${sessionLog.length})`;
    document.getElementById('session-log').style.display = logOpen ? 'block' : 'none';
  } else {
    countBtn.style.display = 'none';
    document.getElementById('session-log').style.display = 'none';
  }
}

function deleteRow(i) { sessionLog.splice(i,1); renderLog(); }

function toggleLog() {
  logOpen = !logOpen;
  document.getElementById('session-log').style.display = logOpen ? 'block' : 'none';
  document.getElementById('log-count-btn').textContent = (logOpen?'▲':'▼')+` Log (${sessionLog.length})`;
}

function copyTSV() {
  const lines = [HEADERS.join('\t'), ...sessionLog.map(r=>[r.timestamp,r.sport,r.player,r.desc,r.book,r.edge,r.odds,r.odds2,r.vigMethod,r.noVigProb,r.trueProb,r.fullKelly,r.units,r.stake,r.totalBet,r.illiquid].join('\t'))];
  navigator.clipboard.writeText(lines.join('\n')).then(()=>{
    const btn = document.getElementById('copy-btn');
    btn.textContent='Copied ✓'; btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy TSV';btn.classList.remove('copied');},2000);
  });
}
</script>
</body>
</html>
